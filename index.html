<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Configuración básica -->
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO básico -->
    <title>Título de la página | Nombre del sitio</title>
    <meta name="description" content="Descripción clara y breve del contenido de la página.">
    <meta name="author" content="Nombre de la empresa o desarrollador">
    <meta name="keywords" content="html, css, desarrollo web, ejemplo">

    <!-- Robots -->
    <meta name="robots" content="index, follow">

    <!-- Icono del sitio -->
    <link rel="icon" href="assets/icons/favicon.ico" type="image/x-icon">

    <!-- Estilos -->
    <link rel="stylesheet" href="css/styles.css">

    <!-- Open Graph básico -->
    <meta property="og:title" content="Título de la página">
    <meta property="og:description" content="Descripción para compartir en redes sociales">
    <meta property="og:type" content="website">
    <meta property="og:image" content="assets/images/preview.jpg">
    <meta property="og:url" content="https://www.ejemplo.com">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Título de la página">
    <meta name="twitter:description" content="Descripción para Twitter">
    <meta name="twitter:image" content="assets/images/preview.jpg">
</head>

</body>
</html>
